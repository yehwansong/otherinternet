<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hash Language Demo</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
}

body {
    background: url(background.png);
    background-size: auto 400%;
    background-repeat: no-repeat;
    background-position-x: center;
    overflow: hidden;
    font-family: "Noto Sans", sans-serif;
}

body.bg-top { background-position-y: 0%; }
body.bg-mid-top { background-position-y: 33.333%; }
body.bg-mid { background-position-y: 66.666%; }
body.bg-low { background-position-y: 100%; }

#overlay {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    color: white;
    font-weight: 500;
    filter: drop-shadow(2px 4px 46px black);
    background: transparent;
    transition: background-color 0.05s linear;
}

#overlay.class-0 { background-color: rgba(255, 36, 0, 0.7); }
#overlay.class-1 { background-color: rgba(255, 242, 0, 0.7); }
#overlay.class-2 { background-color: rgba(0, 51, 237, 0.7); }
#overlay.class-3 { background-color: rgba(0, 239, 119, 0.7); }

#text {
    font-size: 100px;
    font-weight: 700;
    line-height: 0.8;
    writing-mode: vertical-lr;
    text-orientation: mixed;
    transform: scale(0.6) translateY(0px);
    transform-origin: left top;
    white-space: nowrap;
    text-transform: uppercase;
    transition: transform 0.08s linear;
}

#rankDisplay {
    position: fixed;
    right: 20px;
    bottom: 20px;
    color: white;
    font-size: 18px;
    font-weight: 700;
    z-index: 10;
    text-align: right;
    filter: drop-shadow(0 0 8px black);
}
</style>
</head>

<body>

<div id="overlay">
    <div id="text"></div>
</div>

<div id="rankDisplay"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
var firebaseConfig = {
    apiKey: "AIzaSyBb7Hf1EfZFt4ZBV7D-83ZoYh2_268-fA0",
    authDomain: "internetmap-40f5f.firebaseapp.com",
    databaseURL: "https://internetmap-40f5f-default-rtdb.firebaseio.com",
    projectId: "internetmap-40f5f",
    storageBucket: "internetmap-40f5f.firebasestorage.app",
    messagingSenderId: "58899228247",
    appId: "1:58899228247:web:d04ea480cc5ffbf4b06512",
    measurementId: "G-TR5860MX5M"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();
var rankingRef = db.ref("touchRanking/order");
var lastTouchRef = db.ref("touchRanking/lastTouch");

var phrases = {
    "1":  "I let the dog out.",
    "2":  "Dejé salir al perro.",
    "3":  "Ich ließ den Hund raus.",
    "4":  "犬を外に出した。",
    "5":  "J'ai laissé sortir le chien.",
    "6":  "Eu deixei o cachorro sair.",
    "7":  "Я выпустил собаку.",
    "8":  "Ho fatto uscire il cane.",
    "9":  "Ik liet de hond naar buiten.",
    "10": "Wypuściłem psa.",
    "11": "Köpeği dışarı çıkardım.",
    "12": "我把狗放出去了。",
    "13": "Saya membiarkan anjing itu keluar.",
    "14": "Tôi đã thả con chó ra ngoài.",
    "15": "Pustil jsem psa ven.",
    "16": "나는 개를 밖으로 내보냈다.",
    "17": "من سگ را بیرون گذاشتم.",
    "18": "Я випустив собаку.",
    "19": "Kiengedtem a kutyát.",
    "20": "أخرجتُ الكلب."
};

var bgGroups = {
    top: ["2", "7", "11", "15", "19"],
    mid_top: ["3", "5", "10", "16", "18"],
    mid: ["4", "1", "20", "17"],
    low: ["6", "8", "9", "12", "13", "14"]
};

var overlay = document.getElementById("overlay");
var textEl = document.getElementById("text");

var cycleTimer = null;
var stopTimer = null;
var colorIndex = 0;

var textY = 0;
var MAX_SCROLL = 3000;

function getCurrentHash() {
    var hash = window.location.hash.replace("#", "");
    return phrases[hash] ? hash : "1";
}

function setBodyBackgroundClass(hash) {
    document.body.className = document.body.className
        .replace("bg-top", "")
        .replace("bg-mid-top", "")
        .replace("bg-mid", "")
        .replace("bg-low", "");

    if (bgGroups.top.indexOf(hash) !== -1) {
        document.body.className += " bg-top";
    } else if (bgGroups.mid_top.indexOf(hash) !== -1) {
        document.body.className += " bg-mid-top";
    } else if (bgGroups.mid.indexOf(hash) !== -1) {
        document.body.className += " bg-mid";
    } else if (bgGroups.low.indexOf(hash) !== -1) {
        document.body.className += " bg-low";
    }
}

function applyTextTransform() {
    textEl.style.transform = "scale(0.6) translateY(" + textY + "px)";
}

function fitText() {
    var availH = window.innerHeight * 0.92;

    var lo = 4;
    var hi = 2000;
    var mid;

    while (hi - lo > 1) {
        mid = (lo + hi) / 2;
        textEl.style.fontSize = mid + "px";

        if (textEl.offsetWidth <= availH) {
            lo = mid;
        } else {
            hi = mid;
        }
    }

    textEl.style.fontSize = lo + "px";
    applyTextTransform();
}

function updateText() {
    var hash = getCurrentHash();

    textEl.innerHTML = "";
    textEl.appendChild(document.createTextNode(phrases[hash]));

    setBodyBackgroundClass(hash);

    if (hash === "17" || hash === "20") {
        document.body.setAttribute("dir", "rtl");
    } else {
        document.body.setAttribute("dir", "ltr");
    }

    fitText();
}

function updateTouchRanking(hash) {
    rankingRef.transaction(function(current) {
        var order = Array.isArray(current) ? current : [];

        order = order.filter(function(item) {
            return item !== hash;
        });

        order.unshift(hash);

        return order.slice(0, 20);
    });

    lastTouchRef.transaction(function() {
        return {
            hash: hash,
            time: firebase.database.ServerValue.TIMESTAMP
        };
    });
}

rankingRef.on("value", function(snapshot) {
    var order = snapshot.val() || [];
    var rankDisplay = document.getElementById("rankDisplay");
    var html = "";

    for (var i = 0; i < order.length; i++) {
        html += (i + 1) + ". #" + order[i];

        if (i < order.length - 1) {
            html += "<br>";
        }
    }

    rankDisplay.innerHTML = html;
});

function setColor() {
    overlay.className = overlay.className
        .replace("class-0", "")
        .replace("class-1", "")
        .replace("class-2", "")
        .replace("class-3", "");

    overlay.className += " class-" + (colorIndex % 4);
    colorIndex++;
}

function moveTextDown() {
    textY += 18;

    if (textY > MAX_SCROLL) {
        textEl.style.transition = "none";
        textY = 0;
        applyTextTransform();

        setTimeout(function() {
            textEl.style.transition = "transform 0.08s linear";
        }, 30);

        return;
    }

    applyTextTransform();
}

function stopColorCycle() {
    if (cycleTimer) {
        clearInterval(cycleTimer);
        cycleTimer = null;
    }

    overlay.className = overlay.className
        .replace("class-0", "")
        .replace("class-1", "")
        .replace("class-2", "")
        .replace("class-3", "");
}

function touchDetected() {
    var hash = getCurrentHash();

    updateTouchRanking(hash);
    moveTextDown();

    if (!cycleTimer) {
        setColor();

        cycleTimer = setInterval(function() {
            setColor();
        }, 100);
    }

    clearTimeout(stopTimer);

    stopTimer = setTimeout(function() {
        stopColorCycle();
    }, 2000);
}

document.addEventListener("touchstart", touchDetected, false);
document.addEventListener("mousedown", touchDetected, false);

window.addEventListener("hashchange", updateText, false);
window.addEventListener("resize", fitText, false);

updateText();

setInterval(function() {
    window.location.href =
        window.location.pathname +
        "?_t=" + new Date().getTime() +
        window.location.hash;
}, 30000);
</script>

</body>
</html>
