<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Color Touch Flash</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: white;
    }

    body.class-0 { background-color: #ff2400; }
    body.class-1 { background-color: #fff200; }
    body.class-2 { background-color: #0033ed; }
    body.class-3 { background-color: #00ef77; }
  </style>
</head>
<body>

<script>
let cycleTimer = null;
let stopTimer = null;
let colorIndex = 0;

// Touch to flash colors
document.addEventListener("touchstart", () => {
  // Clear existing timers
  if (cycleTimer) clearInterval(cycleTimer);
  if (stopTimer) clearTimeout(stopTimer);

  // Start rapid color cycling
  cycleTimer = setInterval(() => {
    document.body.className = "class-" + (colorIndex % 4);
    colorIndex++;
  }, 100);

  // Stop after 0.5 seconds and return to black
  stopTimer = setTimeout(() => {
    clearInterval(cycleTimer);
    cycleTimer = null;
    document.body.className = "";
  }, 500);
});

// Force reload every 30 seconds with cache-busting timestamp
setInterval(() => {
  const url = new URL(window.location.href);
  url.searchParams.set("_t", Date.now());
  window.location.replace(url.toString());
}, 30000);
</script>

</body>
</html>
