<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hash Language Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
}
#rankDisplay{
    display: none;
}
body {
    background: linear-gradient(#858585, black, black, #858585);
    /*background-size: auto 400%;*/
    background-repeat: no-repeat;
    background-position-x: center;
    overflow: hidden;
  font-family: "Noto Serif", serif;
}

/*body.bg-top { background-position-y: 0%; }
body.bg-mid-top { background-position-y: 33.333%; }
body.bg-mid { background-position-y: 66.666%; }
body.bg-low { background-position-y: 100%; }*/

#overlay {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    color: white;
    font-weight: 500;
    filter: drop-shadow(2px 4px 46px black);
    background: transparent;
    transition: background-color 0.05s linear;
}

#overlay.class-0 { background: rgba(255, 36, 0, 0.7) !important; }
#overlay.class-1 { background: rgba(255, 242, 0, 0.7) !important; }
#overlay.class-2 { background: rgba(0, 51, 237, 0.7) !important; }
#overlay.class-3 { background: rgba(255.255.255, 0.7) !important; }

#text {
    font-size: 100px;
    font-weight: 700;
    line-height: 0.8;
    writing-mode: vertical-lr;
    text-orientation: mixed;
    transform: scale(0.6) translateY(0px);
    transform-origin: left top;
    white-space: nowrap;
    text-transform: uppercase;
    transition: transform 0.08s linear;
     font-weight: 300; 
     text-transform: capitalize;
    font-style: italic;
}

#rankDisplay {
    position: fixed;
    right: 20px;
    bottom: 20px;
    color: white;
    font-size: 18px;
    font-weight: 700;
    z-index: 10;
    text-align: right;
    filter: drop-shadow(0 0 8px black);
}
.group4 #overlay,.group3 #overlay{
    filter: drop-shadow(2px 4px 46px black);
    background: linear-gradient(-90deg, red, transparent);
    transition: background-color 0.05s linear;
    mix-blend-mode: hard-light;
}
.group4,.group3{
    background: linear-gradient(#858585, black, #858585);
}
.group17 #overlay,.group18 #overlay{
    filter: drop-shadow(2px 4px 46px black);
    background: linear-gradient(90deg, red, transparent);
    transition: background-color 0.05s linear;
    mix-blend-mode: hard-light;
}
.group17,.group18{
    background: linear-gradient(#858585, black, #858585);
}
.bg-top{
    background: linear-gradient(180deg, white, black 10%, #ff0a00 70%);
}
.bg-low{
    background: #ff0000;
}
.group16 #text,.group4 #text{
    letter-spacing: -50px;
    margin-left: 18px;
    font-family: serif !important;
    font-style: normal !important
}
.group20 #text,.group17 #text{
    font-style: normal !important
}
.group20 #text{
    font-weight: 700;
    letter-spacing: 0;
    font-family: "Noto Sans",sans-serif;
    left: 1px;
    position: absolute;
}
.group17 #text{
    left: 44px;
    position: absolute;
} 
.group12 #text{
    position: absolute;
    left: 31px;
}
</style>
</head>

<body>

<div id="overlay">
    <div id="text"></div>
</div>

<div id="rankDisplay"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
var firebaseConfig = {
    apiKey: "AIzaSyBb7Hf1EfZFt4ZBV7D-83ZoYh2_268-fA0",
    authDomain: "internetmap-40f5f.firebaseapp.com",
    databaseURL: "https://internetmap-40f5f-default-rtdb.firebaseio.com",
    projectId: "internetmap-40f5f",
    storageBucket: "internetmap-40f5f.firebasestorage.app",
    messagingSenderId: "58899228247",
    appId: "1:58899228247:web:d04ea480cc5ffbf4b06512",
    measurementId: "G-TR5860MX5M"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();
var rankingRef = db.ref("touchRanking/order");
var lastTouchRef = db.ref("touchRanking/lastTouch");
var fakeTouchRef = db.ref("touchRanking/fakeTouch");

var phrases = {
  "1": "J'ai laissé sortir le chien. Il a couru dans le jardin derrière la maison et a commencé à jouer dans l'herbe. Il faisait beau, alors il semblait très heureux. Je l'ai observé pendant quelques minutes avant de le rappeler à l'intérieur. Il est revenu rapidement en remuant la queue.",
  "2": "Ik liet de hond naar buiten. Hij rende naar de achtertuin en begon op het gras te spelen. Het weer was mooi, dus hij leek erg gelukkig. Ik keek een paar minuten naar hem voordat ik hem weer naar binnen riep. Hij kwam snel terug, kwispelend met zijn staart.",
  "3": "Ich ließ den Hund raus. Er rannte in den Hinterhof und begann auf dem Gras zu spielen. Das Wetter war schön, daher wirkte er sehr glücklich. Ich beobachtete ihn einige Minuten lang, bevor ich ihn wieder hereinrief. Er kam schnell zurück und wedelte mit dem Schwanz.",
  "4": "犬を外に出した。犬は裏庭へ走っていき、芝生の上で遊び始めた。天気が良かったので、とても嬉しそうだった。私は数分間その様子を見てから、家の中に戻るよう呼んだ。犬はしっぽを振りながらすぐに戻ってきた。",
  "5": "Dejé salir al perro. Corrió al patio trasero y comenzó a jugar sobre el césped. Hacía buen tiempo, así que parecía muy feliz. Lo observé durante unos minutos antes de llamarlo para que volviera a entrar. Regresó rápidamente, moviendo la cola.",
  "6": "Eu deixei o cachorro sair. Ele correu para o quintal e começou a brincar na grama. O tempo estava agradável, então ele parecia muito feliz. Eu o observei por alguns minutos antes de chamá-lo de volta para dentro. Ele voltou rapidamente, abanando o rabo.",
  "7": "Я выпустил собаку. Она выбежала на задний двор и начала играть на траве. Погода была хорошая, поэтому собака выглядела очень счастливой. Я наблюдал за ней несколько минут, прежде чем позвать обратно в дом. Она быстро вернулась, виляя хвостом.",
  "8": "Ho fatto uscire il cane. È corso nel cortile sul retro e ha iniziato a giocare sull'erba. Il tempo era bello, quindi sembrava molto felice. L'ho osservato per alcuni minuti prima di chiamarlo di nuovo dentro. È tornato rapidamente, scodinzolando.",
  "9": "Wypuściłem psa. Pobiegł na tylne podwórko i zaczął bawić się na trawie. Pogoda była ładna, więc wydawał się bardzo szczęśliwy. Obserwowałem go przez kilka minut, zanim zawołałem go z powrotem do domu. Szybko wrócił, merdając ogonem.",
  "10": "I let the dog out. He ran into the backyard and started playing on the grass. The weather was nice, so he seemed very happy. I watched him for a few minutes before calling him back inside. He returned quickly, wagging his tail.",
  "11": "Köpeği dışarı çıkardım. Arka bahçeye koştu ve çimlerin üzerinde oynamaya başladı. Hava güzeldi, bu yüzden çok mutlu görünüyordu. Onu tekrar içeri çağırmadan önce birkaç dakika izledim. Kuyruğunu sallayarak hızla geri döndü.",
  "12": "أخرجتُ الكلب. ركض إلى الفناء الخلفي وبدأ يلعب على العشب. كان الطقس جميلًا، لذلك بدا سعيدًا جدًا. راقبته لبضع دقائق قبل أن أناديه ليعود إلى الداخل. عاد بسرعة وهو يهز ذيله.",
  "13": "Saya membiarkan anjing itu keluar. Anjing itu berlari ke halaman belakang dan mulai bermain di rumput. Cuacanya bagus, jadi ia tampak sangat senang. Saya memperhatikannya selama beberapa menit sebelum memanggilnya kembali masuk. Ia segera kembali sambil mengibaskan ekornya.",
  "14": "Tôi đã thả con chó ra ngoài. Nó chạy ra sân sau và bắt đầu chơi trên bãi cỏ. Thời tiết rất đẹp nên nó có vẻ rất vui. Tôi quan sát nó vài phút trước khi gọi nó vào trong. Nó nhanh chóng quay lại và vẫy đuôi liên tục.",
  "15": "Pustil jsem psa ven. Rozběhl se na zadní dvůr a začal si hrát na trávě. Počasí bylo pěkné, takže vypadal velmi spokojeně. Několik minut jsem ho pozoroval, než jsem ho zavolal zpátky dovnitř. Rychle se vrátil a vrtěl ocasem.",
  "16": "나는 개를 밖으로 내보냈다. 개는 뒷마당으로 달려가 잔디밭에서 놀기 시작했다. 날씨가 좋아서 무척 행복해 보였다. 나는 몇 분 동안 개를 지켜보다가 다시 집 안으로 들어오라고 불렀다. 개는 꼬리를 흔들며 금방 돌아왔다.",
  "17": "من سگ را بیرون گذاشتم. او به حیاط پشتی دوید و روی چمن شروع به بازی کرد. هوا خوب بود، بنابراین خیلی خوشحال به نظر می‌رسید. چند دقیقه او را تماشا کردم و سپس صدایش زدم تا به داخل برگردد. او با تکان دادن دمش سریع برگشت.",
  "18": "Я випустив собаку. Вона вибігла на заднє подвір'я й почала гратися на траві. Погода була гарною, тому собака виглядала дуже щасливою. Я спостерігав за нею кілька хвилин, перш ніж покликати назад до будинку. Вона швидко повернулася, виляючи хвостом.",
  "19": "Kiengedtem a kutyát. Kiszaladt a hátsó udvarra, és játszani kezdett a füvön. Szép idő volt, ezért nagyon boldognak tűnt. Néhány percig figyeltem, mielőtt visszahívtam volna a házba. Gyorsan visszajött, miközben csóválta a farkát.",
  "20": "我把狗放出去了。它跑到后院，在草地上玩了起来。天气很好，所以它看起来非常开心。我看了它几分钟，然后把它叫回屋里。它摇着尾巴，很快就回来了。",
};

var bgGroups = {
    top: ["2", "11", "19","5", "16"],
    mid_top: ["3", "10", "18"],
    mid: ["4", "1", "20", "17"],
    low: ["6", "8", "15", "7", "9", "12", "13", "14"]
};

var overlay = document.getElementById("overlay");
var textEl = document.getElementById("text");

var cycleTimer = null;
var stopTimer = null;
var colorIndex = 0;

var MAX_SCROLL = 3000;
var textY = MAX_SCROLL;  // 맨 아래에서 시작

function getCurrentHash() {
    var hash = window.location.hash.replace("#", "");
    return phrases[hash] ? hash : "1";
}

function setBodyBackgroundClass(hash) {
    document.body.className = document.body.className
        .replace(/\bbg-top\b/g, "")
        .replace(/\bbg-mid-top\b/g, "")
        .replace(/\bbg-mid\b/g, "")
        .replace(/\bbg-low\b/g, "")
        .replace(/\bgroup\d+\b/g, "")
        .trim();

    document.body.classList.add("group" + hash);

    if (bgGroups.top.indexOf(hash) !== -1) {
        document.body.classList.add("bg-top");
    } else if (bgGroups.mid_top.indexOf(hash) !== -1) {
        document.body.classList.add("bg-mid-top");
    } else if (bgGroups.mid.indexOf(hash) !== -1) {
        document.body.classList.add("bg-mid");
    } else if (bgGroups.low.indexOf(hash) !== -1) {
        document.body.classList.add("bg-low");
    }
}

function applyTextTransform() {
    textEl.style.transform = "scale(0.6) translateY(" + textY + "px) translateX(55%)";
}

function fitText() {
    var availH = window.innerHeight * 0.92;

    var lo = 4;
    var hi = 2000;
    var mid;

    while (hi - lo > 1) {
        mid = (lo + hi) / 2;
        textEl.style.fontSize = (mid) + "px";

        if (textEl.offsetWidth <= availH) {
            lo = mid;
        } else {
            hi = mid;
        }
    }

    textEl.style.fontSize = lo/2 + "px";
    applyTextTransform();
}

function updateText() {
    var hash = getCurrentHash();

    textEl.innerHTML = "";
    textEl.appendChild(document.createTextNode(phrases[hash]));

    setBodyBackgroundClass(hash);

    if (hash === "17" || hash === "20") {
        document.body.setAttribute("dir", "rtl");
    } else {
        document.body.setAttribute("dir", "ltr");
    }

    textY = MAX_SCROLL;  // 텍스트 변경 시 다시 맨 아래로
    fitText();
}

function updateTouchRanking(hash) {
    rankingRef.transaction(function(current) {
        var order = Array.isArray(current) ? current : [];

        order = order.filter(function(item) {
            return item !== hash;
        });

        order.unshift(hash);

        return order.slice(0, 20);
    });

    lastTouchRef.transaction(function() {
        return {
            hash: hash,
            time: firebase.database.ServerValue.TIMESTAMP
        };
    });
}

rankingRef.on("value", function(snapshot) {
    var order = snapshot.val() || [];
    var rankDisplay = document.getElementById("rankDisplay");
    var html = "";

    for (var i = 0; i < order.length; i++) {
        html += (i + 1) + ". #" + order[i];

        if (i < order.length - 1) {
            html += "<br>";
        }
    }

    rankDisplay.innerHTML = html;
});

function setColor() {
    overlay.className = overlay.className
        .replace("class-0", "")
        .replace("class-1", "")
        .replace("class-2", "")
        .replace("class-3", "");

    overlay.className += " class-" + (colorIndex % 4);
    colorIndex++;
}

function moveTextUp() {
    textY -= 380;  // 위로 이동

    if (textY < 0) {
        textEl.style.transition = "none";
        textY = MAX_SCROLL;  // 맨 위 도달 시 맨 아래로 리셋
        applyTextTransform();

        setTimeout(function() {
            textEl.style.transition = "transform 0.5s ease-in-out";
        }, 30);

        return;
    }

    applyTextTransform();
}

function stopColorCycle() {
    if (cycleTimer) {
        clearInterval(cycleTimer);
        cycleTimer = null;
    }

    overlay.className = overlay.className
        .replace("class-0", "")
        .replace("class-1", "")
        .replace("class-2", "")
        .replace("class-3", "");
}

function touchDetected() {
    var hash = getCurrentHash();

    updateTouchRanking(hash);
    moveTextUp();  // 위로 이동

    if (!cycleTimer) {
        setColor();

        cycleTimer = setInterval(function() {
            setColor();
        }, 100);
    }

    clearTimeout(stopTimer);

    stopTimer = setTimeout(function() {
        stopColorCycle();
    }, 2000);
}

document.addEventListener("touchstart", touchDetected, false);
document.addEventListener("mousedown", touchDetected, false);

window.addEventListener("hashchange", updateText, false);
window.addEventListener("resize", fitText, false);

window.addEventListener("load", function () {

    updateText();
});
var lastFakeTouchTime = 0;
var fakeTouchReady = false;

fakeTouchRef.on("value", function(snapshot) {

    var data = snapshot.val();

    if (!data) return;
    if (!data.hash) return;
    if (!data.time) return;

    if (!fakeTouchReady) {
        fakeTouchReady = true;
        lastFakeTouchTime = data.time;
        return;
    }

    if (data.time === lastFakeTouchTime) return;
    lastFakeTouchTime = data.time;

    // 중요: 현재 폰의 hash와 같은 신호만 반응
    // hash는 절대 변경하지 않음
    if (data.hash !== getCurrentHash()) return;

    touchDetected();

});
setInterval(function() {
    window.location.href =
        window.location.pathname +
        "?_t=" + new Date().getTime() +
        window.location.hash;
}, 30000);
</script>

</body>
</html>
